glamira_bigquery:
  target: dev
  outputs:
    # ─── Dataset/schema được override ở model-level config ───
    # Cấu trúc chuẩn: 1 dataset = 1 layer
    # staging  → glamira_staging (dataset) / staging (schema)
    # core     → glamira_core    (dataset) / core    (schema)
    # mart     → glamira_mart    (dataset) / mart    (schema)
    dev:
      type: bigquery
      method: service-account
      project: todo-459814
      dataset: glamira_staging   # Default dataset, override ở model-level
      location: asia-southeast1
      timeout: 300 seconds
      priority: interactive
      retries: 3
      keyfile: D:/Hiep/keys/dbt-key.json

    prod:
      type: bigquery
      method: service-account
      project: todo-459814
      dataset: glamira_staging   # Default dataset, override ở model-level
      location: asia-southeast1
      timeout: 300 seconds
      priority: interactive
      retries: 3
      keyfile: D:/Hiep/keys/dbt-key.json
